# SW/FW release version — update to match the tarball you unpacked
sw_version: "12.1.2.0.32"

# Local path on the remote server where the unpacked SW folder lives
sw_dir: "/root/swfw/Cn5k-sw_{{ sw_version }}"

# Intel oneAPI offline installer filename (must already be present on the remote server at /root/)
oneapi_installer: "intel-oneapi-toolkit-2026.0.0.198_offline.sh"

# Kernel SRPM for rpmbuild (must be present in /root/ after SW tarball is unpacked)
kernel_srpm: "{{ sw_dir}}/opxs-kernel-updates-5.14.0_611.5.1.el9_7.x86_64-322.src.rpm"

# Firmware package path relative to /root/ (update version as needed)
fw_pkg: "12.1.1.1.7/CN5000_SuperNICFirmware-12.1.1.1.3/CN5000.SuperNICFirmware.12_1_1_1_3-V1.pkg"

# Set to true only on the node elected as the Fabric Manager
opafm_node: false
